<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeons & Dragons Monster Lookup</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Dungeons & Dragons Bestiary</h1>

<div class="search">
    <label for="monsterIndex"></label><input type="text" id="monsterIndex" placeholder="Enter Monster Name"/>
    <button onclick="loadMonster()">Search</button>
</div>

<p id="status"></p>
<div id="monsterBio" class="bio hidden">
    <table>
        <tbody>
        <tr>
            <th>Name</th>
            <td id="monsterName"></td>
        </tr>
        <tr>
            <th>Size</th>
            <td id="monsterSize"></td>
        </tr>
        <tr>
            <th>Type</th>
            <td id="monsterType"></td>
        </tr>
        <tr>
            <th>Hit Points</th>
            <td id="monsterHP"></td>
        </tr>
        </tbody>
    </table>
</div>

<script src="app.js"></script>
</body>
</html>
